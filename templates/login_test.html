<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consumir API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="mb-3">Login</h5>
                    <input type="email"    id="correo" class="form-control mb-2" placeholder="Correo">
                    <input type="password" id="clave"  class="form-control mb-3" placeholder="Contraseña">
                    <button class="btn btn-primary w-100" onclick="cargarUsuarios()">
                        Ingresar
                    </button>
                </div>
            </div>


            <div id="token-box" class="alert alert-success mt-3 d-none">
                <strong>✅ Token generado:</strong>
                <p id="token-valor" class="mt-2 mb-0" style="word-break:break-all; font-family:monospace; font-size:12px;"></p>
            </div>

             <h4 class="mb-3">Usuarios de Sistema</h4>
            <div id="contenedor-usuarios_sistema" class="row g-3 mb-5"></div>


            <h4 class="mb-3">Usuarios</h4>
            <div id="contenedor-usuarios" class="row g-3 mb-5"></div>

            <h4 class="mb-3">Cursos</h4>
            <div id="contenedor-cursos" class="row g-3"></div>
        </div>
    </div>

    <!-- Contenedor de tarjetas -->
    <div id="contenedor" class="row g-3"></div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function cargarUsuarios() {
    const datos = {
        correo: document.getElementById('correo').value,
        clave:  document.getElementById('clave').value
    };

    fetch('http://127.0.0.1:5000/api/auth/login', {
        method: 'POST',                          
        
        headers: {
            'Content-Type': 'application/json'  
        },
        body: JSON.stringify(datos)             
    })
    .then(response => response.json())           
    .then(data => {

        // Mostramos el token en pantalla
        document.getElementById('token-box').classList.remove('d-none');
        document.getElementById('token-valor').textContent = data.token;

        // GuardaR cookie
        document.cookie = `jwt_token=${data.token}; path=/; max-age=7200`;


        return Promise.all([
            fetch('http://127.0.0.1:5000/api/usuarios'),
            fetch('http://127.0.0.1:5000/api/cursos'),
            fetch('http://127.0.0.1:5000/api/usuarios_sistema')
        ]);
    })
    .then(responses => Promise.all(responses.map(r => r.json())))
    .then(resultados => {

        const usuarios = resultados[0].data;
        const cursos   = resultados[1].data;
        const usuarios_sistema   = resultados[2].data;

        // ── Renderizar USUARIOS ──
        const contUsuarios = document.getElementById('contenedor-usuarios');
        contUsuarios.innerHTML = '';

        usuarios.forEach(usuario => {
            contUsuarios.innerHTML += `
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${usuario.nombre}</h5>
                            <p class="card-text text-muted">${usuario.email}</p>
                            <span class="badge bg-primary">ID: ${usuario.id}</span>
                        </div>
                    </div>
                </div>
            `;
        });


        const contCursos = document.getElementById('contenedor-cursos');
        contCursos.innerHTML = '';

        cursos.forEach(curso => {
            contCursos.innerHTML += `
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${curso.nombre}</h5>
                            <p class="card-text text-muted">${curso.descripcion}</p>
                            <span class="badge bg-success">ID: ${curso.id}</span>
                        </div>
                    </div>
                </div>
            `;
        });

    })
    .catch(error => console.error('Error:', error));

}

</script>

</body>
</html>
